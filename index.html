<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <style>
        /* 1. 背景は薄いグレー */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        /* 2. 画面中央に大きな文字で『心理学実験室へようこそ』 */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        /* 3. 『実験を開始する』という青いボタン */
        .start-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
        }

        .start-button:hover {
            background-color: #0056b3;
        }

        .start-button:active {
            transform: scale(0.98);
        }

        /* カスタムアラート（ブラウザのalert()は使用不可のため、自作のメッセージボックス） */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            min-width: 280px;
        }

        .modal-button {
            margin-top: 1.5rem;
            padding: 8px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>心理学実験室へようこそ</h1>
        <button class="start-button" id="startBtn">実験を開始する</button>
    </div>

    <!-- 4. アラート（メッセージボックス）の構造 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <p id="modalMessage">Hello World!</p>
            <button class="modal-button" id="closeBtn">閉じる</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');

        // ボタンが押された時の処理
        startBtn.addEventListener('click', () => {
            // アラートの代わりにカスタムメッセージボックスを表示
            modalOverlay.style.display = 'flex';
        });

        // 閉じるボタンが押された時の処理
        closeBtn.addEventListener('click', () => {
            modalOverlay.style.display = 'none';
        });

        // 背景クリックで閉じる
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>

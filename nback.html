<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Back & 2-Back 統合実験</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; line-height: 1.6; user-select: none; }
        .stimulus-container { height: 150px; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        .stimulus { font-size: clamp(40px, 15vw, 80px); font-weight: bold; }
        .jspsych-btn { font-size: 1.1rem; padding: 12px 25px; margin: 10px; min-width: 120px; }
        .guide { color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
        .result-container { max-width: 900px; margin: 0 auto; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f4f4f4; white-space: nowrap; }
    </style>
</head>
<body></body>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwNxtx1D6XFoxP3YUo5frBSkeeO7EdV0rQd_gKy_35SK_MeqjhdFzOaz6te43po9EIivA/exec';

    const jsPsych = initJsPsych({
        on_finish: async function() {
            const display = jsPsych.getDisplayElement();
            display.innerHTML = '<p>データを送信中です...</p>';

            const data = jsPsych.data.get().filter({task: 'trial'}).values();
            const payload = JSON.stringify(data);

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: payload
                });
            } catch (e) {
                console.error("送信失敗", e);
            }

            let html = `<h2>実験終了。ご協力ありがとうございました。</h2>
                        <div class="result-container"><table><tr><th>条件</th><th>文字</th><th>回答</th><th>正誤</th><th>反応時間(ms)</th></tr>`;
            data.forEach(d => {
                let result_mark = (d.correct === '無回答') ? '---' : (d.correct ? '○' : '×');
                let user_resp = (d.response === 0) ? '同じ' : ((d.response === 1) ? '違う' : '未回答');
                html += `<tr><td>${d.condition}</td><td>${d.letter}</td><td>${user_resp}</td><td>${result_mark}</td><td>${d.rt ? Math.round(d.rt) : '---'}</td></tr>`;
            });
            display.innerHTML = html + '</table></div>';
        }
    });

    function generateSequence(n_back) {
        const letters = ['A', 'B', 'C', 'D', 'E'];
        let sequence = [];
        for(let i=0; i<n_back; i++) sequence.push(letters[Math.floor(Math.random()*letters.length)]);
        
        let pool = Array(6).fill('target').concat(Array(14-n_back).fill('non-target'));
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < pool.length; i++) {
            if (pool[i] === 'target') {
                sequence.push(sequence[sequence.length - n_back]);
            } else {
                let options = letters.filter(l => l !== sequence[sequence.length - n_back]);
                sequence.push(options[Math.floor(Math.random() * options.length)]);
            }
        }
        return sequence;
    }

    const timeline = [];

    timeline.push({
        type: jsPsychSurveyText,
        questions: [{ prompt: '参加者IDを入力してください', required: true, name: 'pid' }],
        button_label: '次へ'
    });

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: '<p>使用しているデバイスを選択してください。</p>',
        choices: ['スマホ', 'タブレット', 'パソコン'],
        on_finish: (data) => jsPsych.data.addProperties({ device: ['スマホ', 'タブレット', 'パソコン'][data.response] })
    });

    function createTrials(n_back, label) {
        const sequence = generateSequence(n_back);
        return sequence.map((letter, index) => ({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<div class="guide">課題: ${label} | F(同じ) / J(違う)</div>
                       <div class="stimulus-container"><div id="stim-char" class="stimulus">${letter}</div></div>`,
            choices: ['同じ', '違う'],
            button_html: `<button class="jspsych-btn">%choice%</button>`,
            trial_duration: 2000,
            response_ends_trial: false,
            data: { task: 'trial', condition: label, letter: letter },
            on_load: () => {
                setTimeout(() => { if(document.getElementById('stim-char')) document.getElementById('stim-char').style.visibility = 'hidden'; }, 500);
                const handler = (e) => {
                    const btnIdx = (e.key.toLowerCase() === 'f') ? 0 : (e.key.toLowerCase() === 'j') ? 1 : null;
                    if (btnIdx !== null) {
                        const btn = document.querySelector(`button[data-choice="${btnIdx}"]`);
                        if(btn) btn.click();
                    }
                };
                document.addEventListener('keydown', handler);
                jsPsych.getCurrentTrial().on_finish = () => document.removeEventListener('keydown', handler);
            },
            on_finish: (data) => {
                const is_target = (index >= n_back && letter === sequence[index - n_back]);
                const user_ans = data.response;
                if (user_ans === null) {
                    data.correct = '無回答';
                } else {
                    data.correct = (user_ans === 0 ? is_target : !is_target);
                }
            }
        }));
    }

    timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: '<p>1-Back課題：1つ前の文字と同じなら「同じ」を押してください。</p>', choices: ['開始'] });
    timeline.push(...createTrials(1, '1-back'));

    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: '<p>前半終了です。少し休んでください。<br>次は「2-Back」です。2つ前の文字と同じなら「同じ」を押してください。</p>',
        choices: ['2-Backを開始する']
    });

    timeline.push(...createTrials(2, '2-back'));

    jsPsych.run(timeline);
</script>
</html>

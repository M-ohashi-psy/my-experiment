<!DOCTYPE html>
<html>
  <head>
    <title>jsPsych Experiment</title>
    <!-- jsPsych v7 CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      /* 仕様1: 背景色を灰色 (#808080) に設定 */
      body {
        background-color: #808080;
        color: white; /* 文字を読みやすくするため白に設定 */
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 仕様2: 直径100pxの赤い円 */
      .red-circle {
        width: 100px;
        height: 100px;
        background-color: #ff0000;
        border-radius: 50%;
        margin: 0 auto;
      }

      .instructions {
        margin-top: 20px;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="jspsych-target"></div>

    <script>
      /**
       * jsPsychの初期化
       */
      const jsPsych = initJsPsych({
        display_element: 'jspsych-target',
        on_finish: function() {
          // 実験終了時にデータをブラウザのコンソールに表示（デバッグ用）
          jsPsych.data.displayData();
        }
      });

      // タイムラインの配列を作成
      const timeline = [];

      /**
       * 仕様2 & 3: 赤い円の描画とキー入力待ち
       * html-keyboard-responseプラグインを使用
       */
      const trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div class="red-circle"></div>
          <div class="instructions">スペースキーを押して次へ進んでください</div>
        `,
        choices: [' '], // スペースキーのみ受け付け
        data: {
          task: 'response_trial'
        }
      };
      timeline.push(trial);

      /**
       * 仕様4: 終了メッセージの表示
       */
      const end_message = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div style="font-size: 24px; font-family: sans-serif;">
            実験が終了しました。ご協力ありがとうございました。
          </div>
        `,
        choices: "NO_KEYS", // キー入力を受け付けない（終了画面）
        trial_duration: 3000 // 3秒後に終了
      };
      timeline.push(end_message);

      /**
       * 実験の実行
       */
      jsPsych.run(timeline);
    </script>
  </body>
</html>
